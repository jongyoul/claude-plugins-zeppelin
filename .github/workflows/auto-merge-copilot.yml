name: Auto-merge Copilot PRs

on:
  workflow_run:
    workflows: ["Copilot coding agent"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find Copilot PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Looking for PR from branch: $BRANCH"

          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
            --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Found PR #$PR_NUMBER"
            echo "found=true" >> $GITHUB_OUTPUT
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Check diff safety
        if: steps.find-pr.outputs.found == 'true'
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.number }}"
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" --name-only)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          FORBIDDEN=$(echo "$CHANGED_FILES" | grep -v '^zeppelin-dev/' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Copilot modified files outside zeppelin-dev/: $FORBIDDEN"
            echo "safe=false" >> $GITHUB_OUTPUT
          else
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Mark PR as ready
        if: steps.find-pr.outputs.found == 'true' && steps.diff.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready "${{ steps.find-pr.outputs.number }}" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Squash merge
        if: steps.find-pr.outputs.found == 'true' && steps.diff.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.find-pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --squash

      - name: Close linked issues
        if: steps.find-pr.outputs.found == 'true' && steps.diff.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract issue numbers from PR body (Closes #N)
          PR_BODY=$(gh pr view "${{ steps.find-pr.outputs.number }}" --repo "${{ github.repository }}" --json body --jq '.body')
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+')

          for ISSUE in $ISSUE_NUMBERS; do
            echo "Closing issue #$ISSUE"
            gh issue close "$ISSUE" --repo "${{ github.repository }}" 2>/dev/null || true
          done

      - name: Comment if blocked
        if: steps.find-pr.outputs.found == 'true' && steps.diff.outputs.safe == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.find-pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "Auto-merge blocked: Copilot modified files outside zeppelin-dev/. Manual review required."
