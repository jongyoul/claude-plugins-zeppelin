name: Sync AGENTS.md

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AGENTS.md from upstream
        id: fetch
        run: |
          # TODO: Change back to apache/zeppelin/master after PR #5187 is merged
          if ! curl -sf https://raw.githubusercontent.com/jongyoul/zeppelin/ZEPPELIN-6405-agents-md/AGENTS.md -o AGENTS.md.upstream; then
            echo "AGENTS.md not found on upstream"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        if: steps.fetch.outputs.found == 'true'
        id: check
        run: |
          if [ -f AGENTS.md.current ] && diff -q AGENTS.md.upstream AGENTS.md.current > /dev/null 2>&1; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate diff
        if: steps.check.outputs.changed == 'true'
        id: diff
        run: |
          if [ -f AGENTS.md.current ]; then
            DIFF=$(diff -u AGENTS.md.current AGENTS.md.upstream || true)
          else
            DIFF="(New file — no previous version to compare)"
          fi
          # Save to file for the issue body
          echo "$DIFF" > /tmp/agents-md-diff.txt

      - name: Save updated AGENTS.md.current
        if: steps.check.outputs.changed == 'true'
        run: |
          cp AGENTS.md.upstream AGENTS.md.current
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md.current
          git commit -m "Update AGENTS.md.current from upstream"
          git push

      - name: Create issue for Copilot
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DIFF_CONTENT=$(cat /tmp/agents-md-diff.txt)

          gh issue create \
            --title "Sync: Update skills/agents from AGENTS.md changes" \
            --body "$(cat <<EOF
          ## Context

          AGENTS.md in apache/zeppelin has been updated.
          The latest version is saved in \`AGENTS.md.current\` in this repo.

          ## AGENTS.md Diff

          Only the following changes were made. Update plugin files to reflect **only these changes** — nothing more, nothing less.

          \`\`\`diff
          ${DIFF_CONTENT}
          \`\`\`

          ## Task

          1. Read the diff above carefully
          2. For each changed section, update the corresponding plugin file:
             - Build & Test → \`zeppelin-dev/skills/build/SKILL.md\`
             - Contributing Guide → \`zeppelin-dev/skills/contribute/SKILL.md\`
             - Frontend → \`zeppelin-dev/skills/frontend/SKILL.md\`
             - Module Architecture / Communication / Plugin System → \`zeppelin-dev/agents/architecture-guide.md\`
             - Code Style / Review conventions → \`zeppelin-dev/agents/code-reviewer.md\`
          3. If a section was not changed in the diff, do NOT touch the corresponding file

          ## PR Description

          In the PR description, you MUST:
          - List which AGENTS.md sections changed
          - Map each change to the file you updated
          - Explain why unchanged files were left alone

          See \`.github/copilot-instructions.md\` for full rules.
          EOF
          )" > /tmp/issue_url.txt

          ISSUE_NUMBER=$(cat /tmp/issue_url.txt | grep -o '[0-9]*$')
          echo "Created issue #${ISSUE_NUMBER}"

          # Assign to Copilot coding agent
          gh issue edit "${ISSUE_NUMBER}" --add-assignee "copilot-swe-agent[bot]"
