name: Sync AGENTS.md

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AGENTS.md from upstream
        id: fetch
        run: |
          if ! curl -sf https://raw.githubusercontent.com/apache/zeppelin/master/AGENTS.md -o AGENTS.md.upstream; then
            echo "AGENTS.md not found on upstream"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        if: steps.fetch.outputs.found == 'true'
        id: check
        run: |
          if [ -f AGENTS.md.current ] && diff -q AGENTS.md.upstream AGENTS.md.current > /dev/null 2>&1; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Save updated AGENTS.md.current
        if: steps.check.outputs.changed == 'true'
        run: |
          cp AGENTS.md.upstream AGENTS.md.current
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md.current
          git commit -m "Update AGENTS.md.current from upstream"
          git push

  update-plugin:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create issue for Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Sync: Update skills/agents from AGENTS.md changes" \
            --body "$(cat <<'EOF'
          ## Context

          AGENTS.md in apache/zeppelin has been updated.
          The latest version is saved in AGENTS.md.current in this repo.

          ## Task

          Please update the plugin files based on the changes in AGENTS.md.current:

          1. Read AGENTS.md.current
          2. Update the following files to reflect the changes:
             - zeppelin-dev/skills/build/SKILL.md — Build & test section
             - zeppelin-dev/skills/contribute/SKILL.md — Contributing guide section
             - zeppelin-dev/skills/frontend/SKILL.md — Frontend development section
             - zeppelin-dev/agents/architecture-guide.md — Architecture sections
             - zeppelin-dev/agents/code-reviewer.md — Code style and review conventions
          3. Keep each file focused on its topic, don't duplicate content across files
          4. Keep SKILL.md frontmatter (name, description, tools) intact, only update the body

          ## Notes

          - Do NOT modify plugin.json or update-claude-md/SKILL.md
          - Preserve the existing file structure
          EOF
          )" \
            --assignee "copilot"

  auto-merge:
    runs-on: ubuntu-latest
    if: always()
    needs: update-plugin
    steps:
      - name: Note
        run: echo "Copilot will create a PR. See auto-merge workflow for automatic merging."
