name: Sync AGENTS.md

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AGENTS.md from upstream
        id: fetch
        run: |
          if ! curl -sf https://raw.githubusercontent.com/apache/zeppelin/master/AGENTS.md -o AGENTS.md.upstream; then
            echo "AGENTS.md not found on upstream"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        if: steps.fetch.outputs.found == 'true'
        id: check
        run: |
          if [ -f AGENTS.md.current ] && diff -q AGENTS.md.upstream AGENTS.md.current > /dev/null 2>&1; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update cached AGENTS.md
        if: steps.check.outputs.changed == 'true'
        run: cp AGENTS.md.upstream AGENTS.md.current

      - name: Create PR if changed
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update AGENTS.md from upstream apache/zeppelin"
          title: "Sync AGENTS.md from apache/zeppelin"
          body: |
            AGENTS.md has been updated in apache/zeppelin master.
            Please review and update the plugin skills/agents accordingly.
          branch: sync-agents-md
          base: main
